name: Build Java lazymc

on:
  push:
    branches: [main]
    paths:
      - 'java/lazymc/8/**'
      - 'java/lazymc/11/**'
      - 'java/lazymc/21/**'
      - 'java/lazymc/25/**'
  pull_request:
    branches: [main]
    paths:
      - 'java/lazymc/8/**'
      - 'java/lazymc/11/**'
      - 'java/lazymc/21/**'
      - 'java/lazymc/25/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Java ${{ matrix.java_version }}-lazymc
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        java_version: [8, 11, 21, 25]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/efinaserver/shells/java
          tags: |
            type=raw,value=${{ matrix.java_version }}-lazymc

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: java/lazymc/${{ matrix.java_version }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=java-lazymc-${{ matrix.java_version }}
          cache-to: type=gha,mode=max,scope=java-lazymc-${{ matrix.java_version }}
