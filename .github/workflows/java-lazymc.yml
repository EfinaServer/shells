name: Build Java lazymc

on:
  push:
    branches: [main]
    paths:
      - 'java/lazymc/8/**'
      - 'java/lazymc/11/**'
      - 'java/lazymc/21/**'
      - 'java/lazymc/25/**'
  pull_request:
    branches: [main]
    paths:
      - 'java/lazymc/8/**'
      - 'java/lazymc/11/**'
      - 'java/lazymc/21/**'
      - 'java/lazymc/25/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Java ${{ matrix.java_version }}-lazymc
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        java_version: [8, 11, 21, 25]

    steps:
      - uses: actions/checkout@v4

      - name: Get commit timestamp
        id: git-timestamp
        run: echo "value=$(git log -1 --format=%cI)" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/efinaserver/shells/java
          tags: |
            type=raw,value=${{ matrix.java_version }}-lazymc
          labels: |
            org.opencontainers.image.created=${{ steps.git-timestamp.outputs.value }}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Blacksmith builder
        uses: useblacksmith/setup-docker-builder@v1
        with:
          platforms: linux/amd64,linux/arm64

      - name: Build and push
        uses: useblacksmith/build-push-action@v2
        with:
          context: java/lazymc/${{ matrix.java_version }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
