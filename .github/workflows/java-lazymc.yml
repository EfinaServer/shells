name: Build Java lazymc

on:
  push:
    branches: [main]
    paths:
      - 'java/lazymc/8/**'
      - 'java/lazymc/11/**'
      - 'java/lazymc/21/**'
      - 'java/lazymc/25/**'
  pull_request:
    branches: [main]
    paths:
      - 'java/lazymc/8/**'
      - 'java/lazymc/11/**'
      - 'java/lazymc/21/**'
      - 'java/lazymc/25/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Java ${{ matrix.java_version }}-lazymc
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        java_version: [8, 11, 21, 25]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/efinaserver/shells/java
          tags: |
            type=raw,value=${{ matrix.java_version }}-lazymc

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: java/lazymc/${{ matrix.java_version }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=java-lazymc-${{ matrix.java_version }}
          cache-to: type=gha,mode=max,scope=java-lazymc-${{ matrix.java_version }}
