name: Build Java lazymc

on:
  push:
    branches: [main]
    paths:
      - 'java/lazymc/8/**'
      - 'java/lazymc/11/**'
      - 'java/lazymc/21/**'
      - 'java/lazymc/25/**'
  pull_request:
    branches: [main]
    paths:
      - 'java/lazymc/8/**'
      - 'java/lazymc/11/**'
      - 'java/lazymc/21/**'
      - 'java/lazymc/25/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Java ${{ matrix.java_version }}-lazymc
    runs-on: blacksmith-2vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        java_version: [8, 11, 21, 25]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/efinaserver/shells/java
          tags: |
            type=raw,value=${{ matrix.java_version }}-lazymc

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: java/lazymc/${{ matrix.java_version }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=java-lazymc-${{ matrix.java_version }}
          cache-to: type=gha,mode=max,scope=java-lazymc-${{ matrix.java_version }}
